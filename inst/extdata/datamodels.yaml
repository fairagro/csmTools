    - ORGANIC_MATERIAL_APPLICS
    - FERTILIZERS
    - FERTILIZER_APPLICS
    - IRRIGATIONS
    - IRRIGATION_APPLICATIONS
    - CHEMICALS
    - CHEMICAL_APPLICS
    - MULCHES
    - ENVIRON_MODIFICATIONS
    - ENVIRON_MODIF_LEVELS
    - HARVESTS
    - HARVEST_EVENTS
    - TREATMENTS
    - MANAGEMENTS
    - PLOT_LAYOUT
    - PLOTS
    - PLOT_SETUP
    - PLANT_DATA
    - PLANT_SM_GROWTH
    - PLANT_SM_DEV
    - PLANT_SM_NUTRIENTS
    - PLANT_TS_GROWTH_DEV
    - PLANT_TS_NUTRIENTS
    - PLANT_TS_PESTS_DISEASES
    - SOILS
    - SOIL_DATA
    - SOIL_LYR_PHYSICAL
    - SOIL_LYR_CHEMICAL
    - SOIL_LYR_TEMPERATURE
    - SOIL_LYR_NPK
    - SOIL_LYR_NUTRIENTS
    - SOIL_LYR_NITROGEN
    - SOIL_LYR_PHOSPHORUS
    - SOIL_LYR_ORGMATTER
    - SOIL_LYR_CARBON
    - SOIL_LYR_WATER
