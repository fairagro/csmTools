# ================================================================
# BonaRes-LTE Data Model
# ================================================================

bonares-lte_de:
  # BonaRes LTE is a data model used to annotate single long-term experiments
  # It includes global data sheets on environment data (e.g., weather) with no explicit links
  # to the experiment --> Experiment_name is used as a master key
  master_key: "experiment"
  key_source_table: "METADATA" 
  design_keys:
    experiment: "Experiment_name"
    year: "Versuchsjahr"
    treatment: "Pruefglied_ID"
    plot: "Parzelle_ID"
  data_tables:
    - METADATA
    - VERSUCHSAUFBAU
    - PRUEFGLIED
    - FAKTOR
    - FAKTOR1_STUFE
    - FAKTOR2_STUFE
    - FAKTOR3_STUFE
    - PARZELLE
    - FRUCHTFOLGE
    - KULTUR
    - SAAT_PFLANZGUT
    - SORTE
    - AUSSAAT
    - BEREGNUNG
    - DUENGUNG
    - DUENGEMITTEL
    - PFLANZENSCHUTZ
    - PFLANZENSCHUTZMITTEL
    - BODENBEARBEITUNG
    - ERNTE
    - ERTRAG
    - PROBENAHME_PFLANZEN
    - PFLANZENLABORWERTE
    - PROBENAHME_BODEN
    - BODENLABORWERTE
    - KLIMADATEN
    
  mappings: null 


# ================================================================
# ICASA Output Model
# ================================================================

icasa:
  master_key: "experiment"
  key_source_table: "GENERAL"
  design_keys:
    experiment: "experiment_id"
    year: "experiment_year"
    treatment: "treatment_number"
    plot: "plot_id"
  shared_tables:
    - PROFILE_METADATA
    - SOIL_GENERAL
    - SOIL_PROFILE
    - WEATHER_GENERAL
    - STATION_METADATA
    - WEATHER_DAILY
    - WEATHER_GENER_PARMS
  data_tables:
    - GENERAL
    - PERSONS
    - INSTITUTIONS
    - DOCUMENTS
    - TREATMENTS
    - FIELDS
    - GENOTYPES
    - PLANTINGS
    - IRRIGATIONS
    - FERTILIZERS
    - ORGANIC_MATERIALS
    - CHEMICALS
    - TILLAGE
    - HARVESTS
    - SUMMARY
    - TIME_SERIES
  dict_source:
    type: "url_fetch_icasa"
    path: "https://raw.githubusercontent.com/DSSAT/ICASA-Dictionary/main/CSV/"  
    
  # --- Properties for when this model is an OUTPUT ---
  mappings:
    "dssat": "map_dssat_icasa.yaml"
    "icasa-agro": "map_icasaAgro_icasa.yaml"
    "bonares-lte_de": "map_bonares_icasa.yaml"
    "nasa-power": "map_nasapower_icasa.yaml"
    "user": "map_custom.yaml"


# ================================================================
# ICASA-Agronomy representation (Input model)
# ================================================================

icasa-agro:
  # ICASA-agro is used to annotate multiple experiments
  # No data sheets is truly global: link between experiment and external resources are explicitly
  # defined with join keys --> no master key
  master_key: none
  data_tables:
    - EXPERIMENTS
    - INSTITUTIONS
    - PERSONS
    - DOCUMENTS
    - FIELDS
    - CROP_SEASON
    - GENOTYPES
    - TILLAGE
    - TILLAGE_EVENTS
