    - WEATHER
    - WEATHER_MONTHLY
    - WEATHER_DAILY
  dict_source: null


# ================================================================
# DSSAT Output Model
# ================================================================

dssat:
  master_key: "experiment"
  key_source_table: "GENERAL"
  design_keys:
    experiment: "EXP_ID"
    year: "EXP_YEAR"
    treatment: "TRTNO"
    plot: "PLTID"
  shared_tables:
    - WEATHER_METADATA
    - WEATHER_DAILY
    - SOIL_META
    - SOIL_GENERAL
    - SOIL_LAYERS
  data_tables:
    - GENERAL
    - TREATMENTS
    - CULTIVARS
    - FIELDS
    - INITIAL_CONDITIONS
    - ENVIRONMENT_MODIFICATIONS
    - PLANTING_DETAILS
    - IRRIGATION
    - FERTILIZERS
    - RESIDUES
    - CHEMICALS
    - TILLAGE
    - HARVEST
    - SIMULATION_CONTROLS
  dict_source: null
    
  # --- Properties for when this model is an OUTPUT ---
  mappings:
    "icasa": "map_icasa_dssat.yaml"
    

